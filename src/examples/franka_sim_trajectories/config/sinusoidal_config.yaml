robot:
  path: './src/thunder/franka_generatedFiles/param/franka_par.yaml'

trajectory:
  type: 'ros2'

  bag: './rosbag/softhand_sinusoidal_CT'

  topic: '/computed_torque_controller/joint_states'

  interval: [5, 25] # [s]
  joints: ['panda_joint1', 'panda_joint2', 'panda_joint3', 'panda_joint4', 'panda_joint5', 'panda_joint6', 'panda_joint7']


processing:
  pipeline:
     - 'decimating'
     - 'filtering'
     - 'differentiating'
     - 'differentiating'
     - 'filtering'
  cut_off_frequency: 10 # [rad/s]
  compute_velocities: true
  butterworth_order: 5
  apply_decimation: false
  decimate_factor: 10


identification:
  method: 'WLS' # OLS, WLS, OLS|prior, WLS|prior

  optimization: 'ipopt'  # 'ipopt', 'SA' - Optimization method for maximum-likelihood estimation

  # CasADi optimizer ----
  positive_threshold: 1e-10 # positive threshold for constrained problem definition
  inertia_scale_factor: 1


  weight:
    loss: 1 # gain factor for base parameters optimization

    mass: 1e-3     # as mass std.dev [Kg]
    CoM: 1e-4      # as CoM std.dev [m]
    inertia: 1e-4  # as Inertia std.dev [Kg/m^2]

    link: [1, 1, 1, 1, 1, 1, 1]
